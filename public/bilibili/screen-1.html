    <script>
        // Micro-interaction for brush stroke particle effect on button click
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                // Ignore icon buttons for this specific effect to keep it subtle
                if(this.querySelector('.material-symbols-outlined')) return;
                
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.width = '2px';
                ripple.style.height = '2px';
                ripple.style.background = '#131313'; // ink color
                ripple.style.borderRadius = '50%';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.style.transform = 'scale(0)';
                ripple.style.animation = 'ripple 0.6s linear';
                ripple.style.pointerEvents = 'none';
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });</script>
