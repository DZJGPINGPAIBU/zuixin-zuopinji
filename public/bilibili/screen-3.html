        /* Atmospheric Fog and Ink Bleed Effects */
        .ink-vapor {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;

        }
        .section-transition {
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }
        
        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Brush Stroke Underline Hover */
        .brush-stroke-underline-on-hover {
            position: relative;
        }
        .brush-stroke-underline-on-hover::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: currentColor;
            transform: scaleX(0);
            transform-origin: bottom right;
            transition: transform 0.3s ease-out;
            border-radius: 2px;
            opacity: 0.8;
            /* Simple imitation of a brush stroke */
            clip-path: polygon(0 40%, 10% 20%, 90% 20%, 100% 40%, 100% 60%, 90% 80%, 10% 80%, 0 60%);
        }
        .brush-stroke-underline-on-hover:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }
        
        /* Text Texture for Rugged Calligraphy */
        .text-ink-texture {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.15"/></svg>');

        }
